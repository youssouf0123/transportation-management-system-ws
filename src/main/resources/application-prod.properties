spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/tms}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}}
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
app.documents.storage-dir=${APP_DOCUMENTS_STORAGE_DIR:./uploads/documents}
app.documents.r2.enabled=${APP_DOCUMENTS_R2_ENABLED:false}
app.documents.r2.account-id=${R2_ACCOUNT_ID:}
app.documents.r2.access-key-id=${R2_ACCESS_KEY_ID:}
app.documents.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
app.documents.r2.bucket-name=${R2_BUCKET_NAME:}
app.translation.deepl.api-key=c03149a5-213c-4a85-983f-6cad65cb18a5:fx
app.translation.deepl.base-url=${DEEPL_API_BASE_URL:https://api-free.deepl.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8100,http://localhost:4200}
