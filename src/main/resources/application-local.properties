spring.datasource.url=jdbc:h2:mem:tmsdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-local.sql
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
app.documents.storage-dir=./uploads/documents
app.documents.r2.enabled=${APP_DOCUMENTS_R2_ENABLED:false}
app.documents.r2.account-id=${R2_ACCOUNT_ID:}
app.documents.r2.access-key-id=${R2_ACCESS_KEY_ID:}
app.documents.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
app.documents.r2.bucket-name=${R2_BUCKET_NAME:}
app.translation.deepl.api-key=c03149a5-213c-4a85-983f-6cad65cb18a5:fx
app.translation.deepl.base-url=${DEEPL_API_BASE_URL:https://api-free.deepl.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8100,http://localhost:4200}
